<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  <!-- Background rounded rectangle -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#bg-grad)" />
  
  <!-- Film Strip / Play Button Icon -->
  <!-- Outer reel ring -->
  <circle cx="50" cy="50" r="30" fill="#ffffff" />
  <circle cx="50" cy="50" r="24" fill="url(#bg-grad)" />
  
  <!-- Center play triangle -->
  <polygon points="44,38 62,50 44,62" fill="#ffffff" />
  
  <!-- Outer sprocket holes -->
  <circle cx="50" cy="14" r="3" fill="#ffffff" />
  <circle cx="75" cy="25" r="3" fill="#ffffff" />
  <circle cx="86" cy="50" r="3" fill="#ffffff" />
  <circle cx="75" cy="75" r="3" fill="#ffffff" />
  <circle cx="50" cy="86" r="3" fill="#ffffff" />
  <circle cx="25" cy="75" r="3" fill="#ffffff" />
  <circle cx="14" cy="50" r="3" fill="#ffffff" />
  <circle cx="25" cy="25" r="3" fill="#ffffff" />
</svg>